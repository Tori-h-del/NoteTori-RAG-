{% extends 'base.html' %}

{% block title %}编辑笔记 - Flask 笔记{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8">
        <div class="card shadow">
            <div class="card-body">
                <h3 class="card-title mb-4">编辑笔记</h3>
                <form method="POST">
                    <div class="mb-3">
                        <label for="title" class="form-label">标题</label>
                        <input type="text" class="form-control" id="title" name="title" value="{{ note.title }}" required>
                    </div>
                    <div class="mb-3">
                        <label for="category" class="form-label">分类</label>
                        <input type="text" class="form-control" id="category" name="category" value="{{ note.category }}" placeholder="例如: 工作, 生活, 学习...">
                    </div>
                    <div class="mb-3">
                        <label for="content" class="form-label">内容</label>
                        <textarea class="form-control" id="content" name="content" rows="10" required>{{ note.content }}</textarea>
                    </div>
                    <div class="d-flex justify-content-between">
                        <a href="{{ url_for('index') }}" class="btn btn-outline-secondary">取消</a>
                        <button type="submit" class="btn btn-primary">更新笔记</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
