{% extends 'base.html' %}

{% block title %}搜索结果 - Flask 笔记{% endblock %}

{% block content %}
<div class="row">
    <div class="col-md-12 mb-4">
        <h2>搜索结果: "{{ query }}"</h2>
        <p class="text-muted">找到 {{ notes|length }} 个相关笔记</p>
    </div>
</div>

<div class="row">
    {% if notes %}
        {% for note in notes %}
            <div class="col-md-4">
                <div class="card h-100 shadow-sm">
                    <div class="card-body">
                        <h5 class="card-title">{{ note.title }}</h5>
                        <p class="card-text text-truncate">{{ note.content }}</p>
                    </div>
                    <div class="card-footer bg-white border-top-0 d-flex justify-content-between">
                        <a href="{{ url_for('view_note', id=note.id) }}" class="btn btn-sm btn-outline-info">查看</a>
                        <div class="btn-group">
                            <a href="{{ url_for('edit_note', id=note.id) }}" class="btn btn-sm btn-outline-secondary">编辑</a>
                            <form action="{{ url_for('delete_note', id=note.id) }}" method="POST" class="d-inline" onsubmit="return confirm('确定删除吗？');">
                                <button type="submit" class="btn btn-sm btn-outline-danger">删除</button>
                            </form>
                        </div>
                    </div>
                </div>
            </div>
        {% endfor %}
    {% else %}
        <div class="col-12 text-center py-5">
            <p class="text-muted">未找到匹配的笔记。</p>
            <a href="{{ url_for('index') }}" class="btn btn-primary">返回首页</a>
        </div>
    {% endif %}
</div>
{% endblock %}
